# ============================================================================
# Section 0 — Guard: skip role cleanly if no config repo URL is set
# ============================================================================
# The nvim role is a no-op when nvim_config_repo_url is empty. This lets the
# skeleton run on machines that haven't configured a nvim-config repo yet
# without adding per-task when: guards everywhere.

- name: Verify nvim_config_repo_url is set before continuing
  ansible.builtin.assert:
    that: nvim_config_repo_url | length > 0
    fail_msg: >-
      nvim_config_repo_url is empty. Set it in host_vars/localhost.yml to
      deploy neovim config, or exclude the nvim tag to skip this role.
    success_msg: "nvim_config_repo_url is set — proceeding with nvim role."

# ============================================================================
# Section 1 — Determine whether neovim needs to be installed
# ============================================================================

- name: Check whether neovim is already installed
  ansible.builtin.command: nvim --version
  register: _nvim_version_output
  changed_when: false
  failed_when: false

- name: Parse installed neovim version string
  ansible.builtin.set_fact:
    _nvim_installed_version: >-
      {{
        _nvim_version_output.stdout
        | regex_search('NVIM v([0-9]+\.[0-9]+\.[0-9]+)', '\1')
        | first
        | default('0.0.0')
      }}
  when: _nvim_version_output.rc == 0

- name: Set installed version to 0.0.0 when neovim is absent
  ansible.builtin.set_fact:
    _nvim_installed_version: "0.0.0"
  when: _nvim_version_output.rc != 0

# _nvim_needs_install is true when:
#   - install_method is 'appimage' (user explicitly wants the upstream binary)
#   - OR the installed version is below nvim_min_version
#   - AND install_method is not 'none'
- name: Evaluate whether neovim installation is required
  ansible.builtin.set_fact:
    _nvim_needs_install: >-
      {{
        nvim_install_method != 'none'
        and (
          nvim_install_method == 'appimage'
          or _nvim_installed_version is version(nvim_min_version, '<')
        )
      }}

- name: Report neovim version status
  ansible.builtin.debug:
    msg: >-
      neovim {{ _nvim_installed_version }} installed
      (minimum required: {{ nvim_min_version }},
      install method: {{ nvim_install_method }},
      needs install: {{ _nvim_needs_install }})

# ============================================================================
# Section 2 — Package manager installation (nvim_install_method == 'package')
# ============================================================================

# ── RHEL family (not Fedora): EPEL required for neovim ───────────────────────
# Fedora ships neovim in its standard repos. RHEL, Rocky, AlmaLinux, and
# CentOS Stream do not — neovim lives in EPEL.
- name: Ensure EPEL repository is enabled (RHEL-family, non-Fedora)
  ansible.builtin.dnf:
    name: epel-release
    state: present
  become: true
  when:
    - _nvim_needs_install | bool
    - nvim_install_method == 'package'
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_facts['distribution'] != 'Fedora'

# Update apt cache before installing on Debian/Ubuntu. The generic
# ansible.builtin.package module does not accept update_cache, so this
# is a separate distro-specific step.
- name: Update apt package cache (Debian / Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true
  when:
    - _nvim_needs_install | bool
    - nvim_install_method == 'package'
    - ansible_facts['os_family'] == 'Debian'

# Single generic install task for all Linux package managers.
# ansible.builtin.package auto-detects dnf / apt / zypper from the OS family.
- name: Install neovim via system package manager (Linux)
  ansible.builtin.package:
    name: neovim
    state: present
  become: true
  when:
    - _nvim_needs_install | bool
    - nvim_install_method == 'package'
    - ansible_facts['system'] == 'Linux'

# Homebrew has no ansible.builtin backend; ansible.builtin.command is used
# instead of community.general.homebrew to avoid the collection dependency.
# _nvim_needs_install guards against redundant re-runs.
- name: Install neovim via Homebrew (macOS)
  ansible.builtin.command:
    cmd: brew install neovim
  become: false
  register: _nvim_brew_result
  changed_when: "'already installed' not in _nvim_brew_result.stdout"
  when:
    - _nvim_needs_install | bool
    - nvim_install_method == 'package'
    - ansible_facts['system'] == 'Darwin'

# ── Post-package version check ─────────────────────────────────────────────
# Re-check after installation so we can warn if the distro package is too old.
# This most commonly affects Ubuntu LTS where the packaged neovim lags behind.
- name: Re-check neovim version after package installation
  ansible.builtin.command: nvim --version
  register: _nvim_version_post_install
  changed_when: false
  failed_when: false
  when: _nvim_needs_install | bool

- name: Parse post-install neovim version
  ansible.builtin.set_fact:
    _nvim_post_install_version: >-
      {{
        _nvim_version_post_install.stdout
        | regex_search('NVIM v([0-9]+\.[0-9]+\.[0-9]+)', '\1')
        | first
        | default('0.0.0')
      }}
  when:
    - _nvim_needs_install | bool
    - _nvim_version_post_install.rc == 0

- name: Warn when installed package version is below the required minimum
  ansible.builtin.debug:
    msg: >-
      WARNING: neovim {{ _nvim_post_install_version }} is below the required
      minimum {{ nvim_min_version }}. The config repo may not load correctly.
      Consider setting nvim_install_method: appimage in host_vars/localhost.yml
      to install the upstream binary instead.
  when:
    - _nvim_needs_install | bool
    - _nvim_version_post_install is defined
    - _nvim_post_install_version is defined
    - _nvim_post_install_version is version(nvim_min_version, '<')

# ============================================================================
# Section 3 — AppImage installation (nvim_install_method == 'appimage')
# ============================================================================
# Downloads the official upstream AppImage to an XDG-compliant location and
# writes a thin wrapper script at ~/.local/bin/nvim. Root is not required.

- name: Set AppImage filename for this architecture
  ansible.builtin.set_fact:
    _nvim_appimage_filename: >-
      {{
        'nvim-linux-x86_64.appimage'
        if ansible_facts['architecture'] == 'x86_64'
        else 'nvim-linux-arm64.appimage'
      }}
  when:
    - nvim_install_method == 'appimage'
    - ansible_facts['system'] == 'Linux'

- name: Ensure AppImage destination directory exists
  ansible.builtin.file:
    path: "{{ nvim_appimage_dir }}"
    state: directory
    mode: "0755"
  when:
    - nvim_install_method == 'appimage'
    - ansible_facts['system'] == 'Linux'

- name: Download neovim AppImage
  ansible.builtin.get_url:
    url: >-
      https://github.com/neovim/neovim/releases/download/{{
        nvim_appimage_version }}/{{ _nvim_appimage_filename }}
    dest: "{{ nvim_appimage_dir }}/nvim.appimage"
    mode: "0755"
    force: false   # Skip download if file already exists; re-run with force: true to upgrade
  when:
    - nvim_install_method == 'appimage'
    - ansible_facts['system'] == 'Linux'

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    state: directory
    mode: "0755"
  when:
    - nvim_install_method == 'appimage'
    - ansible_facts['system'] == 'Linux'

- name: Write nvim wrapper script pointing at AppImage
  ansible.builtin.copy:
    dest: "{{ nvim_bin_wrapper_path }}"
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      # Wrapper generated by dotfiles nvim role — do not edit by hand.
      # Re-run 'ansible-playbook site.yml --tags nvim' to regenerate.
      exec "{{ nvim_appimage_dir }}/nvim.appimage" "$@"
  when:
    - nvim_install_method == 'appimage'
    - ansible_facts['system'] == 'Linux'

# ── 'none' method: verify neovim is present and warn if version is low ────────
- name: Warn when install_method is 'none' and neovim is absent
  ansible.builtin.debug:
    msg: >-
      WARNING: nvim_install_method is 'none' but neovim was not found on PATH.
      Install neovim manually or change nvim_install_method.
  when:
    - nvim_install_method == 'none'
    - _nvim_version_output.rc != 0

# ============================================================================
# Section 4 — Config directory and repo clone
# ============================================================================

- name: Ensure ~/.config/nvim parent directory exists
  ansible.builtin.file:
    path: "{{ nvim_config_dir | dirname }}"
    state: directory
    mode: "0755"

# Normalise the repo URL before any git operation. HTTPS GitHub URLs are
# converted to SSH so that the headless Ansible context never tries to prompt
# for credentials. SSH alias URLs (git@github-dotfiles-nvim:...) and plain
# SSH URLs pass through unchanged.
- name: Normalise nvim_config_repo_url to SSH alias format
  ansible.builtin.set_fact:
    _nvim_effective_repo_url: >-
      {{
        nvim_config_repo_url
        | regex_replace('^https://github\.com/(.+?)(?:\.git)?$', 'git@github.com:\1.git')
        | regex_replace('git@github\.com:', 'git@github-dotfiles-nvim:')
      }}

- name: Report effective repo URL
  ansible.builtin.debug:
    msg: "nvim-config repo: {{ _nvim_effective_repo_url }}
          (original: {{ nvim_config_repo_url }})"

# If ~/.config/nvim exists but is not a git repo it may be a pre-existing
# manual config. Back it up before cloning to avoid data loss.
- name: Stat existing nvim config directory
  ansible.builtin.stat:
    path: "{{ nvim_config_dir }}"
  register: _nvim_config_dir_stat

- name: Check whether existing nvim config is a git repository
  ansible.builtin.stat:
    path: "{{ nvim_config_dir }}/.git"
  register: _nvim_config_git_stat
  when: _nvim_config_dir_stat.stat.exists

- name: Back up non-git nvim config directory before cloning
  ansible.builtin.command: >-
    mv {{ nvim_config_dir }}
    {{ nvim_config_dir }}.bak-{{ ansible_date_time.date }}
  when:
    - _nvim_config_dir_stat.stat.exists
    - not (_nvim_config_git_stat.stat.exists | default(false))
  changed_when: true

# ansible.builtin.git handles clone-or-update in a single task.
# update: "{{ nvim_config_update }}" controls whether subsequent runs pull.
# force: false prevents the module from discarding local edits on pull; if
# the working tree is dirty the task will fail with a clear message.
- name: Clone or update nvim-config repository
  ansible.builtin.git:
    repo: "{{ _nvim_effective_repo_url }}"
    dest: "{{ nvim_config_dir }}"
    version: "{{ nvim_config_branch }}"
    update: "{{ nvim_config_update | bool }}"
    force: false
  register: _nvim_config_git_result

- name: Report nvim-config clone/update status
  ansible.builtin.debug:
    msg: >-
      nvim-config: {{
        'skipped (update disabled)' if _nvim_config_git_result is skipped
        else 'cloned fresh' if (_nvim_config_git_result.before | default(none)) is none
        else ('already up to date' if not _nvim_config_git_result.changed
              else ('updated '
                    + (_nvim_config_git_result.before | default('unknown'))[:8]
                    + ' → '
                    + (_nvim_config_git_result.after  | default('unknown'))[:8]))
      }}

# ============================================================================
# Section 5 — Sync infrastructure
# ============================================================================
# Mirrors the dotfiles sync role. The nvim-config sync runs on its own timer
# so updates to the config repo are pulled independently of dotfiles sync.

- name: Ensure nvim-config state and log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ nvim_state_dir }}"
    - "{{ nvim_state_dir }}/logs"
    - "{{ nvim_sync_conf_dir }}"

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    state: directory
    mode: "0755"

- name: Deploy nvim-config-sync script to ~/.local/bin
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/nvim-sync.sh"
    dest: "{{ nvim_sync_script_dest }}"
    mode: "0755"

# sync.conf is created once and never overwritten. DEV_MODE and GIT_BRANCH
# state live here and are mutated at runtime by the user.
- name: Create nvim-config sync.conf if not present
  ansible.builtin.template:
    src: nvim-sync.conf.j2
    dest: "{{ nvim_sync_conf_path }}"
    mode: "0600"
    force: false

# sync.conf is created once (force: false above) but REPO_URL must stay in
# sync with host_vars when the user switches from a raw URL to an SSH alias.
# This task updates only that one line, leaving DEV_MODE and GIT_BRANCH alone.
- name: Ensure sync.conf REPO_URL matches nvim_config_repo_url
  ansible.builtin.lineinfile:
    path: "{{ nvim_sync_conf_path }}"
    regexp: '^REPO_URL='
    line: 'REPO_URL="{{ _nvim_effective_repo_url }}"'

# ── Linux: systemd user timer ─────────────────────────────────────────────────

- name: Ensure systemd user unit directory exists (Linux)
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/systemd/user"
    state: directory
    mode: "0755"
  when: ansible_facts['system'] == 'Linux'

- name: Deploy nvim-config-sync systemd user units
  ansible.builtin.template:
    src: "systemd/{{ item }}.j2"
    dest: "{{ xdg_config_home }}/systemd/user/{{ item }}"
    mode: "0644"
  loop:
    - nvim-config-sync.service
    - nvim-config-sync.timer
  when: ansible_facts['system'] == 'Linux'
  notify: Reload and enable nvim-config timer

- name: Ensure systemd user daemon is reloaded (Linux)
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when: ansible_facts['system'] == 'Linux'

# ── macOS: launchd agent ──────────────────────────────────────────────────────

- name: Ensure LaunchAgents directory exists (macOS)
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents"
    state: directory
    mode: "0755"
  when: ansible_facts['system'] == 'Darwin'

- name: Deploy nvim-config-sync launchd agent plist (macOS)
  ansible.builtin.template:
    src: launchd/com.nvim-config.sync.plist.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.nvim-config.sync.plist"
    mode: "0644"
  when: ansible_facts['system'] == 'Darwin'
  notify: Load nvim-config launchd agent
