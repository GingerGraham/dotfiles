# ansible/roles/sync-external/tasks/repo.yml
# ─────────────────────────────────────────────────────────────────────────────
# Processes a single entry from external_synced_repos. Included via a loop
# from tasks/main.yml with loop_var: repo.
# Expects: repo.name, repo.repo_url, repo.clone_dir, repo.private,
#          repo.allow_hooks (optional, default false — see Step 7b)
#
# The src/dest/command[0] validation rules enforced below (Steps 5a-5c) are
# also implemented independently in scripts/validate-sync-manifest.sh (a
# developer-time check add-on repo authors run by hand — see that script's
# own header) and documented in docs/sync-manifest-spec.md, which is the
# single authoritative source if the three ever disagree. Each of the three
# implementations names the other two; a discrepancy is a bug against
# whichever one doesn't match the spec.

# ── Step 1: Resolve clone_dir to an absolute path ─────────────────────────────
# Generated config/deploy.list/hooks.list content must use fully-expanded
# absolute paths — the sync script never performs tilde expansion at runtime.

- name: "Resolve clone_dir to an absolute path: {{ repo.name }}"
  ansible.builtin.set_fact:
    _clone_dir_absolute: "{{ repo.clone_dir | regex_replace('^~', ansible_facts['env']['HOME']) }}"

# ── Step 2: Ensure per-repo config/state directories exist ────────────────────

- name: "Ensure per-repo config and state directories exist: {{ repo.name }}"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ external_sync_conf_dir }}/{{ repo.name }}"
    - "{{ external_sync_state_dir }}/{{ repo.name }}/logs"

# ── Step 3: Normalise the repo URL (public/private aware) ─────────────────────
# Private repos rewrite the URL to this repo's own SSH alias
# (dotfiles-<name>, any git host — see install.sh's _extract_git_host) so its
# dedicated deploy key is used. The host itself is never inspected here: the
# owner/repo(.git) path is extracted from whatever form repo_url is in
# (https://host/path, git@host:path, ssh://git@host/path, or an
# already-rewritten git@dotfiles-<name>:path alias) and rebuilt against the
# alias, which keeps this idempotent across re-runs regardless of the
# original host. Public repos are used verbatim — no rewrite, no key.

- name: "Extract owner/repo path from repo URL: {{ repo.name }}"
  ansible.builtin.set_fact:
    _repo_url_path: >-
      {{
        (
          repo.repo_url
          | regex_replace('^https://[^/]+/', '')
          | regex_replace('^ssh://git@[^/]+/', '')
          | regex_replace('^git@[^:]+:', '')
          | regex_replace('\.git$', '')
        ) + '.git'
      }}

- name: "Normalise repo URL: {{ repo.name }}"
  ansible.builtin.set_fact:
    _effective_repo_url: >-
      {{
        ('git@dotfiles-' + repo.name + ':' + _repo_url_path)
        if (repo.private | bool)
        else repo.repo_url
      }}

# ── Step 4: Adopt-or-clone ─────────────────────────────────────────────────────
# ansible.builtin.git with update: false is naturally idempotent here: when
# clone_dir already holds a valid git repo it is adopted in place — no
# re-clone, no pull. Ongoing pulls belong to the external-sync timer, not to
# Ansible. When clone_dir is absent it is cloned fresh. A pre-existing
# non-git directory is backed up first so the clone task never fails against
# a dirty target.

- name: "Stat clone_dir: {{ repo.name }}"
  ansible.builtin.stat:
    path: "{{ _clone_dir_absolute }}"
  register: _clone_dir_stat

- name: "Stat clone_dir/.git: {{ repo.name }}"
  ansible.builtin.stat:
    path: "{{ _clone_dir_absolute }}/.git"
  register: _clone_dir_git_stat
  when: _clone_dir_stat.stat.exists

- name: "Back up non-git clone_dir before cloning: {{ repo.name }}"
  ansible.builtin.command:
    argv:
      - mv
      - "{{ _clone_dir_absolute }}"
      - "{{ _clone_dir_absolute }}.bak-{{ now(fmt='%Y-%m-%d') }}"
  when:
    - _clone_dir_stat.stat.exists
    - not (_clone_dir_git_stat.stat.exists | default(false))
  changed_when: true

# version is deliberately omitted (not pinned to 'main') so a first clone
# checks out whatever the remote's actual default branch is — repos whose
# default branch isn't 'main' would otherwise clone the wrong ref. That
# makes the result depend on the remote's current HEAD, which is exactly
# what update: false + the adopt-in-place behaviour above is designed to
# tolerate (see the role README's "Adopt vs clone" section).
- name: "Clone or adopt repository: {{ repo.name }}" # noqa: latest[git]
  ansible.builtin.git:
    repo: "{{ _effective_repo_url }}"
    dest: "{{ _clone_dir_absolute }}"
    update: false
    force: false
  register: _repo_git_result

- name: "Report clone/adopt status: {{ repo.name }}"
  ansible.builtin.debug:
    msg: >-
      {{
        'cloned fresh' if (_repo_git_result.before | default(none)) is none
        else 'adopted existing clone (no pull — the external-sync timer owns that)'
      }}

# ── Step 5: Read the repo's .dotfiles-sync.yml manifest ───────────────────────
# Absent manifest = clone-only repo (empty deploy map, no hooks).

- name: "Stat .dotfiles-sync.yml: {{ repo.name }}"
  ansible.builtin.stat:
    path: "{{ _clone_dir_absolute }}/.dotfiles-sync.yml"
  register: _manifest_stat

- name: "Read .dotfiles-sync.yml: {{ repo.name }}"
  ansible.builtin.slurp:
    path: "{{ _clone_dir_absolute }}/.dotfiles-sync.yml"
  register: _manifest_raw
  when: _manifest_stat.stat.exists

- name: "Parse manifest: {{ repo.name }}"
  ansible.builtin.set_fact:
    _manifest: "{{ (_manifest_raw.content | b64decode | from_yaml) if _manifest_stat.stat.exists else {} }}"

# ── Step 5a: Validate deploy[].src does not escape clone_dir ──────────────────
# .dotfiles-sync.yml is authored by whoever owns the external repo, not by
# this dotfiles repo — deploy.list is built by concatenating clone_dir with
# entry.src verbatim (see deploy.list.j2), so an unvalidated src of e.g.
# '../.ssh/id_rsa' would let a malicious/compromised add-on repo read and
# deploy files from outside its own clone. src must stay a relative path
# within the clone (see docs/sync-manifest-spec.md's "Path resolution" note).

- name: "Validate manifest deploy entries do not escape clone_dir: {{ repo.name }}"
  ansible.builtin.assert:
    that:
      # Short-circuits in order — item.src is defined must fail first so the
      # later conditions never call .startswith()/.split() on Undefined.
      - item.src is defined
      - item.src | length > 0
      - not item.src.startswith('/')
      - "'..' not in item.src.split('/')"
    fail_msg: >-
      Rejecting {{ repo.name }}'s .dotfiles-sync.yml: deploy[].src
      '{{ item.src | default('(missing)') }}' must be a non-empty path
      relative to the repo root, without '..' segments or a leading '/'
      (src is resolved against clone_dir — see docs/sync-manifest-spec.md
      §Deploy semantics).
    quiet: true
  loop: "{{ _manifest.deploy | default([]) }}"
  loop_control:
    label: "{{ item.src | default('(missing src)') }}"

# ── Step 5b: Validate deploy[].dest / dest_macos do not target an unsafe path
#             (DF-4) ──────────────────────────────────────────────────────────
# src's threat model (Step 5a) applies more strongly to dest: it's the write
# direction. dest: ~/.ssh/authorized_keys or ~/.bashrc would render into
# deploy.list and deploy without complaint otherwise. _dest_denylist_*
# (dirs_absolute/files_absolute/dirs_pattern) are computed once for the whole
# play in tasks/main.yml, not per repo. See docs/sync-manifest-spec.md's dest
# validation rules — if this ever disagrees with the spec, the spec wins.

- name: "Validate manifest deploy entries do not target an unsafe dest: {{ repo.name }}"
  vars:
    _dest_absolute: "{{ (item.dest | default('')) | regex_replace('^~', ansible_facts['env']['HOME']) }}"
  ansible.builtin.assert:
    that:
      - item.dest is defined
      - item.dest | length > 0
      - _dest_absolute.startswith(ansible_facts['env']['HOME'] + '/')
      - "'..' not in _dest_absolute.split('/')"
      - _dest_absolute not in _dest_denylist_files_absolute
      - not (_dest_absolute is search(_dest_denylist_dirs_pattern))
    fail_msg: >-
      Rejecting {{ repo.name }}'s .dotfiles-sync.yml: deploy[].dest
      '{{ item.dest | default('(missing)') }}' must resolve under $HOME,
      contain no '..' segments, and must not target a path this engine has
      no business writing into (see docs/sync-manifest-spec.md §Deploy
      semantics, "dest validation").
    quiet: true
  loop: "{{ _manifest.deploy | default([]) }}"
  loop_control:
    label: "{{ item.dest | default('(missing dest)') }}"

- name: "Validate manifest deploy entries do not target an unsafe dest_macos: {{ repo.name }}"
  vars:
    _dest_absolute: "{{ (item.dest_macos | default('')) | regex_replace('^~', ansible_facts['env']['HOME']) }}"
  ansible.builtin.assert:
    that:
      - item.dest_macos | length > 0
      - _dest_absolute.startswith(ansible_facts['env']['HOME'] + '/')
      - "'..' not in _dest_absolute.split('/')"
      - _dest_absolute not in _dest_denylist_files_absolute
      - not (_dest_absolute is search(_dest_denylist_dirs_pattern))
    fail_msg: >-
      Rejecting {{ repo.name }}'s .dotfiles-sync.yml: deploy[].dest_macos
      '{{ item.dest_macos | default('(missing)') }}' must resolve under
      $HOME, contain no '..' segments, and must not target a path this
      engine has no business writing into (see docs/sync-manifest-spec.md
      §Deploy semantics, "dest validation").
    quiet: true
  loop: "{{ _manifest.deploy | default([]) }}"
  loop_control:
    label: "{{ item.dest_macos | default('n/a') }}"
  when: item.dest_macos is defined

# ── Step 5c: Validate hooks.post_deploy.command[0] ─────────────────────────────
# Same rules and same reasoning as Step 5a's src validation — command[0] is a
# path relative to the clone root that this engine will pass to `bash`, so it
# must not escape clone_dir either. Validated whenever the manifest declares
# a hook, regardless of whether host_vars' allow_hooks gate (Step 7b) is open
# — a malformed manifest is a bug worth catching immediately, not only once
# hooks happen to be enabled on some machine.

- name: "Validate hooks.post_deploy.command does not escape clone_dir: {{ repo.name }}"
  vars:
    _hook_command: "{{ (_manifest.hooks.post_deploy.command | default([])) }}"
  ansible.builtin.assert:
    that:
      - _hook_command is sequence
      - _hook_command is not string
      - _hook_command | length > 0
      - _hook_command[0] | length > 0
      - not _hook_command[0].startswith('/')
      - "'..' not in _hook_command[0].split('/')"
    fail_msg: >-
      Rejecting {{ repo.name }}'s .dotfiles-sync.yml: hooks.post_deploy.command
      must be a non-empty list (argv form, not a string) whose first element
      is a non-empty path relative to the repo root, without '..' segments or
      a leading '/' (see docs/sync-manifest-spec.md §Hook contract, "command
      validation").
    quiet: true
  when: (_manifest.hooks.post_deploy | default(none)) is not none

# ── Step 6: Resolve effective branch ───────────────────────────────────────────

- name: "Resolve effective branch: {{ repo.name }}"
  ansible.builtin.set_fact:
    _effective_branch: "{{ _manifest.branch | default('main') }}"

# ── Step 7: Render sync.conf (created once, never overwritten) ────────────────
# DEV_MODE and GIT_BRANCH live here and are mutated at runtime by the user —
# Ansible must not clobber them on subsequent runs. Only REPO_URL is kept in
# sync via the lineinfile task below, for the case where repo_url changes in
# host_vars (e.g. switching to an SSH alias after enabling a private repo).

- name: "Create sync.conf if not present: {{ repo.name }}"
  ansible.builtin.template:
    src: sync.conf.j2
    dest: "{{ external_sync_conf_dir }}/{{ repo.name }}/sync.conf"
    mode: "0600"
    force: false

- name: "Ensure sync.conf REPO_URL matches host_vars: {{ repo.name }}"
  ansible.builtin.lineinfile:
    path: "{{ external_sync_conf_dir }}/{{ repo.name }}/sync.conf"
    regexp: '^REPO_URL='
    line: 'REPO_URL="{{ _effective_repo_url }}"'

# ── Step 7a: Render deploy.list from the parsed manifest ──────────────────────
# Always written (empty when clone-only) so state is explicit. Unlike
# sync.conf this is pure derived data owned by Ansible — it is regenerated
# every Ansible run so manifest changes upstream are picked up. Note "every
# Ansible run", not "every sync cycle": the external-sync timer only pulls
# and re-reads this already-rendered file, it never re-parses the manifest
# itself — see docs/sync-manifest-spec.md's "How to make your repo
# compatible" and check_manifest_drift() in scripts/external-sync.sh (DF-1).

- name: "Render deploy.list: {{ repo.name }}"
  ansible.builtin.template:
    src: deploy.list.j2
    dest: "{{ external_sync_conf_dir }}/{{ repo.name }}/deploy.list"
    mode: "0644"

# ── Step 7b: Render hooks.list, gated by host_vars' allow_hooks (D4) ──────────
# The manifest is authored by the add-on repo; host_vars is the machine
# owner's trust statement. Both must agree before a hook ever runs. When the
# manifest declares a hook but this repo's allow_hooks is not true, hooks.list
# is rendered *empty* (never omitted — the file's presence/absence is not
# meaningful, only its content) and the run still succeeds: an upstream repo
# adding a hook must not break every machine's next Ansible pass, only warn
# on the ones that haven't opted in.

- name: "Determine hook gate state: {{ repo.name }}"
  ansible.builtin.set_fact:
    _hook_declared: "{{ (_manifest.hooks.post_deploy | default(none)) is not none }}"
    _hooks_allowed: "{{ repo.allow_hooks | default(false) | bool }}"

- name: "Warn when a hook is declared but not allowed by host_vars: {{ repo.name }}"
  ansible.builtin.debug:
    msg: >-
      {{ repo.name }} declares a post_deploy hook
      ({{ _manifest.hooks.post_deploy.command | default([]) | join(' ') }})
      but host_vars/localhost.yml does not set allow_hooks: true for this
      entry — the hook will NOT run. A hook is arbitrary code from that repo,
      run unattended on a timer, so this is opt-in per machine. To enable it,
      set "allow_hooks: true" on this repo's entry in
      ansible/host_vars/localhost.yml and re-run.
  when:
    - _hook_declared
    - not _hooks_allowed

- name: "Compute manifest hash: {{ repo.name }}"
  ansible.builtin.command:
    argv:
      - git
      - hash-object
      - "{{ _clone_dir_absolute }}/.dotfiles-sync.yml"
  register: _manifest_hash_result
  changed_when: false
  when: _manifest_stat.stat.exists

# Step 7c below: git hash-object, not sha256sum/shasum — git is already a
# hard dependency, and the two checksum binaries have different names on
# Linux vs macOS. This is the single implementation of "what hash represents
# this manifest" — scripts/external-sync.sh's check_manifest_drift() and
# cmd_status() both call the exact same `git hash-object` command and compare
# against what this task writes, so the two can never compute the hash
# differently. Only this task writes manifest-hash; the script only reads it
# (DF-1 — see docs/sync-manifest-spec.md).

- name: "Write manifest-hash state file: {{ repo.name }}"
  ansible.builtin.copy:
    content: "{{ (_manifest_hash_result.stdout | trim) if _manifest_stat.stat.exists else 'absent' }}"
    dest: "{{ external_sync_state_dir }}/{{ repo.name }}/manifest-hash"
    mode: "0644"

- name: "Render hooks.list: {{ repo.name }}"
  ansible.builtin.template:
    src: hooks.list.j2
    dest: "{{ external_sync_conf_dir }}/{{ repo.name }}/hooks.list"
    mode: "0644"

# ── Step 8: Initial deploy ─────────────────────────────────────────────────────
# Runs the same script the timer uses — the single source of deploy truth.
# Ansible never re-implements the deploy loop itself.
#
# changed_when reads the EXTERNAL_SYNC_RESULT summary line
# scripts/external-sync.sh emits at the end of every sync_one() call (DF-5),
# rather than matching human log() prose — rewording a log() line used to
# silently break change reporting, and hooks made that worse by adding more
# log lines that could collide with the old substring matches.

- name: "Run initial sync/deploy: {{ repo.name }}"
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/external-sync {{ repo.name }}"
  register: _repo_initial_sync
  changed_when: >-
    'head_moved=true' in _repo_initial_sync.stdout
    or (_repo_initial_sync.stdout | regex_search('deploy_changes=[1-9]')) is not none
