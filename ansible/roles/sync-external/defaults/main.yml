# ansible/roles/sync-external/defaults/main.yml
# ─────────────────────────────────────────────────────────────────────────────
# Structural defaults only — mirrors group_vars/all.yml. The real repo list is
# always populated in host_vars/localhost.yml (or generated by install.sh);
# an empty list here means the role does nothing beyond deploying the
# (idle) timer/service units.

external_synced_repos: []
external_sync_conf_dir: "{{ xdg_config_home }}/external-sync"
external_sync_state_dir: "{{ xdg_data_home }}/external-sync"
