# ansible/roles/sync-external/defaults/main.yml
# ─────────────────────────────────────────────────────────────────────────────
# Structural defaults only — mirrors group_vars/all.yml. The real repo list is
# always populated in host_vars/localhost.yml (or generated by install.sh);
# an empty list here means the role does nothing beyond deploying the
# (idle) timer/service units.

external_synced_repos: []
external_sync_conf_dir: "{{ xdg_config_home }}/external-sync"
external_sync_state_dir: "{{ xdg_data_home }}/external-sync"

# ── dest validation (DF-4) ───────────────────────────────────────────────────
# A manifest's deploy[].dest is authored by whoever owns the add-on repo, not
# by this dotfiles repo — the same threat model that justifies validating
# deploy[].src (a compromised/malicious upstream reading outside its clone)
# applies more strongly to dest, since it's the *write* direction. Each of
# these is owned by a dotfiles role or is a live credential store; an add-on
# repo writing there is always a bug or an attack, never a legitimate use of
# the manifest. See tasks/repo.yml and docs/sync-manifest-spec.md.
#
# Directory prefixes — dest may not resolve to anything under these.
sync_external_dest_denylist_dirs:
  - "~/.ssh/"
  - "~/.gnupg/"
  - "~/.config/shell/"
  - "~/.config/git/"
  - "~/.config/dotfiles/"
  - "~/.config/external-sync/"
  - "~/.config/systemd/user/"
  - "~/Library/LaunchAgents/"

# Exact files — dest may not resolve to exactly one of these.
sync_external_dest_denylist_files:
  - "~/.bashrc"
  - "~/.zshrc"
  - "~/.profile"
  - "~/.gitconfig"
