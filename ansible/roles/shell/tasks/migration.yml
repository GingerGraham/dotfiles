# ============================================================================
# Section 7 — Warn if migration backups exist
# ============================================================================
# Backup files are written by the stub deployment tasks in main.yml whenever
# a real (non-symlink) file was found at a stub destination. The user's
# original content is preserved intact — no parsing or transformation.
#
# This task simply reports what was backed up so the user knows to review.

- name: shell | migration | check for backup files
  ansible.builtin.find:
    paths: "{{ dotfiles_migration_dir }}"
    patterns: "*.pre-dotfiles.bak"
  register: _migration_backups

- name: shell | migration | report backed up files
  ansible.builtin.debug:
    msg: >-
      Backed up to {{ dotfiles_migration_dir }}/{{ item.path | basename }}.
      Review it and add anything you want to keep to
      {{ shell_config_dir }}/env/90-local.sh
  loop: "{{ _migration_backups.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: _migration_backups.files | length > 0

- name: shell | migration | confirm clean migration
  ansible.builtin.debug:
    msg: "No pre-existing shell config files found — clean install."
  when: _migration_backups.files | length == 0
