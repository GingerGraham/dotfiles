# ============================================================================
# Section 1 — Derive repo root
# ============================================================================
- name: Set dotfiles repo root fact
  ansible.builtin.set_fact:
    dotfiles_repo_root: "{{ playbook_dir | dirname }}"

# ============================================================================
# Section 2 — Verify shell config source exists in repo
# ============================================================================
- name: Stat shell config source directory
  ansible.builtin.stat:
    path: "{{ dotfiles_repo_root }}/shell/config"
  register: _shell_config_source

- name: Fail if shell config source is absent from repo
  ansible.builtin.fail:
    msg: >-
      Shell config source not found at {{ dotfiles_repo_root }}/shell/config.
      Ensure the shell/ directory is present and committed in the dotfiles repo.
  when: not _shell_config_source.stat.exists

# ============================================================================
# Section 3 — Migrate linuxDotFiles symlinks
# ============================================================================
# Stat each known legacy path directly — no filesystem scan required.
# We know exactly which paths linuxDotFiles managed; checking only those
# is both faster and immune to permission errors in unrelated directories.

- name: shell | migration | stat known legacy symlink paths
  ansible.builtin.stat:
    path: "{{ item }}"
  register: _legacy_stat
  loop: "{{ shell_legacy_paths }}"
  loop_control:
    label: "{{ item }}"

- name: shell | migration | remove stale linuxDotFiles symlinks
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  when:
    - item.stat.exists
    - item.stat.islnk
    - "'linuxDotFiles' in (item.stat.lnk_target | default(''))"
  loop: "{{ _legacy_stat.results }}"
  loop_control:
    label: "{{ item.stat.path | default(item.item) }}"

- name: shell | migration | report removed symlinks
  ansible.builtin.debug:
    msg: "Removed stale linuxDotFiles symlink: {{ item.stat.path }}"
  when:
    - item.stat.exists
    - item.stat.islnk
    - "'linuxDotFiles' in (item.stat.lnk_target | default(''))"
  loop: "{{ _legacy_stat.results }}"
  loop_control:
    label: "{{ item.stat.path | default(item.item) }}"

- name: shell | migration | confirm no legacy symlinks found
  ansible.builtin.debug:
    msg: "No linuxDotFiles symlinks found — nothing to clean up."
  when: >-
    _legacy_stat.results
    | selectattr('stat.exists', 'equalto', true)
    | selectattr('stat.islnk', 'equalto', true)
    | selectattr('stat.lnk_target', 'search', 'linuxDotFiles')
    | list | length == 0

# ============================================================================
# Section 4 — Deploy shell config directory symlink
# ============================================================================
- name: Stat shell config destination
  ansible.builtin.stat:
    path: "{{ shell_config_dir }}"
  register: _shell_config_dest

- name: Fail if shell config destination is a real directory
  ansible.builtin.fail:
    msg: >-
      {{ shell_config_dir }} exists as a real directory, not a symlink.
      Back it up and remove it manually before re-running this role.
      Any files you want to keep should be moved to shell/config/ in the repo.
  when:
    - _shell_config_dest.stat.exists
    - not _shell_config_dest.stat.islnk

- name: Symlink shell config directory to repo source
  ansible.builtin.file:
    src: "{{ dotfiles_repo_root }}/shell/config"
    dest: "{{ shell_config_dir }}"
    state: link

# ============================================================================
# Section 5 — Deploy shell stub symlinks (.bashrc, .zshrc, .zshenv)
# ============================================================================
- name: Stat shell stub destinations
  ansible.builtin.stat:
    path: "{{ item.dest }}"
  register: _stub_stats
  loop: "{{ shell_stubs }}"
  loop_control:
    label: "{{ item.dest }}"

- name: shell | migration | ensure migration backup directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_migration_dir }}"
    state: directory
    mode: "0700"
  when:
    - _stub_stats.results | selectattr('stat.exists') | selectattr('stat.islnk', 'equalto', false) | list | length > 0

- name: Back up existing non-symlink stub files
  ansible.builtin.copy:
    src: "{{ item.item.dest }}"
    dest: "{{ dotfiles_migration_dir }}/{{ item.item.dest | basename }}.pre-dotfiles.bak"
    remote_src: true
    force: false
    mode: "0644"
  when:
    - item.stat.exists
    - not item.stat.islnk
  loop: "{{ _stub_stats.results }}"
  loop_control:
    label: "{{ item.item.dest }}"

- name: Remove original stub files that have been backed up
  ansible.builtin.file:
    path: "{{ item.item.dest }}"
    state: absent
  when:
    - item.stat.exists
    - not item.stat.islnk
  loop: "{{ _stub_stats.results }}"
  loop_control:
    label: "{{ item.item.dest }}"

- name: Deploy shell stub symlinks into HOME
  ansible.builtin.file:
    src: "{{ dotfiles_repo_root }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
  loop: "{{ shell_stubs }}"
  loop_control:
    label: "{{ item.dest }}"

# ============================================================================
# Section 6 — Deploy machine-local env override (create once, never overwrite)
# ============================================================================
- name: Deploy 90-local.sh machine override template
  ansible.builtin.template:
    src: env/90-local.sh.j2
    dest: "{{ shell_config_dir }}/env/90-local.sh"
    mode: "0644"
    force: false

- name: shell | migration | process pre-existing .zshrc content
  ansible.builtin.include_tasks: migration.yml

# ============================================================================
# Section 6b — Deploy default starship config (create once, never overwrite)
# ============================================================================
- name: Deploy default starship.toml (create once, never overwrite)
  ansible.builtin.template:
    src: starship.toml.j2
    dest: "{{ xdg_config_home }}/starship.toml"
    mode: "0644"
    force: false
