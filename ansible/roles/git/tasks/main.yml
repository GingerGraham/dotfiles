- name: git | resolve projects_base path
  ansible.builtin.set_fact:
    projects_base_expanded: "{{ projects_base | replace('~', ansible_facts['env']['HOME']) }}"

# ── Config directories ────────────────────────────────────────────────────────

- name: git | ensure ~/.config/git/profiles exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/git/profiles"
    state: directory
    mode: '0700'

# ── Static config files ───────────────────────────────────────────────────────

- name: git | deploy global gitignore
  ansible.builtin.copy:
    src: ignore
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/ignore"
    mode: '0644'

- name: git | deploy global gitattributes
  ansible.builtin.copy:
    src: attributes
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/attributes"
    mode: '0644'

# ── ~/.gitconfig ──────────────────────────────────────────────────────────────
# Rendered on every run. Stable template — only global settings and two [include]
# lines. Does not contain any project-specific includeIf blocks.

- name: git | deploy ~/.gitconfig
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.gitconfig"
    mode: '0600'

# ── project-includes ──────────────────────────────────────────────────────────
# Rendered on every run from host_vars. The shell function git-add-project also
# updates this file and host_vars/localhost.yml, so they stay in sync.

- name: git | deploy project-includes
  ansible.builtin.template:
    src: project-includes.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/project-includes"
    mode: '0600'

# ── projects.yml manifest ─────────────────────────────────────────────────────
# Written ONCE from host_vars (force: no). The live source of truth thereafter.
# Updated by git-add-project / git-update-project / git-remove-project.
# Rebuild from host_vars: delete this file and re-run, or git-sync-projects --from-host-vars.

- name: git | write projects.yml manifest (first run only)
  ansible.builtin.template:
    src: projects.yml.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/projects.yml"
    mode: '0600'
    force: false

# ── Profile .inc files ────────────────────────────────────────────────────────
# Written ONCE per project (force: no). Managed live by git-update-project.
# The git config --file approach in the shell functions handles field-level
# updates without rewriting the whole file.

- name: git | deploy profile .inc files (first run only per project)
  ansible.builtin.template:
    src: profile.inc.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/profiles/{{ (item.context + '-' + item.provider) | lower | replace(' ', '-') }}.inc"
    mode: '0600'
    force: false
  loop: "{{ git_projects }}"
  loop_control:
    label: "{{ item.context }}/{{ item.provider }}"
  when: git_projects | length > 0

# ── local.inc ─────────────────────────────────────────────────────────────────
# Machine-local overrides: credential helpers, personal tokens, etc.
# Never managed by Ansible beyond initial creation.

- name: git | create local.inc if absent
  ansible.builtin.copy:
    content: |
      # Machine-local git config — never managed by Ansible.
      # Credential helpers, host-specific settings, etc. go here.
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/profiles/local.inc"
    mode: '0600'
    force: false

# ── Project directories ───────────────────────────────────────────────────────

- name: git | ensure projects base directory exists
  ansible.builtin.file:
    path: "{{ projects_base_expanded }}"
    state: directory
    mode: '0755'

- name: git | create project directories
  ansible.builtin.file:
    path: "{{ projects_base_expanded }}/{{ item.context }}/{{ item.provider }}"
    state: directory
    mode: '0755'
  loop: "{{ git_projects }}"
  loop_control:
    label: "{{ item.context }}/{{ item.provider }}"
  when: git_projects | length > 0

# ── XDG Projects migration ────────────────────────────────────────────────────
# Only runs when projects_base is not ~/Development.
# Moves existing ~/Development contents into ~/Projects, then replaces
# ~/Development with a compatibility symlink.

- name: git | migration | check for legacy ~/Development directory
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/Development"
  register: legacy_dev_stat
  when:
    - dotfiles_profile != 'minimal'
    - projects_base_expanded != ansible_facts['env']['HOME'] + '/Development'

# Abort if the repo is inside ~/Development, since the move would break it and manual intervention is needed to fix paths.
- name: git | migration | abort if dotfiles repo is inside ~/Development
  ansible.builtin.fail:
    msg: >-
      The dotfiles repo is located inside ~/Development ({{ dotfiles_repo_root }}),
      which is the directory this migration would move. Re-clone the repo to
      {{ projects_base_expanded }}/Personal/GitHub/dotfiles and re-run from there.
  when:
    - dotfiles_profile != 'minimal'
    - projects_base_expanded != ansible_facts['env']['HOME'] + '/Development'
    - legacy_dev_stat is defined
    - legacy_dev_stat.stat.exists
    - legacy_dev_stat.stat.isdir
    - not legacy_dev_stat.stat.islnk
    - dotfiles_repo_root.startswith(ansible_facts['env']['HOME'] + '/Development')

- name: git | migration | move ~/Development contents to Projects
  ansible.builtin.shell:
    cmd: |
      set -e
      shopt -s dotglob nullglob

      merge_into() {
          local src="$1" dst="$2"
          local item name
          mkdir -p "${dst}"
          for item in "${src}"/*; do
              [[ -e "${item}" ]] || continue
              name="${item##*/}"
              if [[ -d "${item}" && -d "${dst}/${name}" ]]; then
                  merge_into "${item}" "${dst}/${name}"
                  rmdir "${item}" 2>/dev/null || true
              else
                  mv "${item}" "${dst}/"
              fi
          done
      }

      merge_into "{{ ansible_facts['env']['HOME'] }}/Development" "{{ projects_base_expanded }}"
    executable: /bin/bash
  when:
    - dotfiles_profile != 'minimal'
    - projects_base_expanded != ansible_facts['env']['HOME'] + '/Development'
    - legacy_dev_stat is defined
    - legacy_dev_stat.stat.exists
    - legacy_dev_stat.stat.isdir
    - not legacy_dev_stat.stat.islnk
  changed_when: true

- name: git | migration | remove now-empty ~/Development directory
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/Development"
    state: absent
  when:
    - dotfiles_profile != 'minimal'
    - projects_base_expanded != ansible_facts['env']['HOME'] + '/Development'
    - legacy_dev_stat is defined
    - legacy_dev_stat.stat.exists
    - legacy_dev_stat.stat.isdir
    - not legacy_dev_stat.stat.islnk

- name: git | migration | create ~/Development → Projects symlink
  ansible.builtin.file:
    src: "{{ projects_base_expanded }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/Development"
    state: link
  when:
    - dotfiles_profile != 'minimal'
    - projects_base_expanded != ansible_facts['env']['HOME'] + '/Development'
    - legacy_dev_stat is defined
    - legacy_dev_stat.stat.exists
    - legacy_dev_stat.stat.isdir
    - not legacy_dev_stat.stat.islnk
