# ============================================================================
# Section 4 — Sync infrastructure
# ============================================================================
# 30-minute timer: AI tooling config changes more frequently than nvim config
# (prompts, settings, CLAUDE.md updates) so a shorter cadence makes sense.

- name: Ensure ai-config state and log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ai_state_dir }}"
    - "{{ ai_state_dir }}/logs"
    - "{{ ai_sync_conf_dir }}"

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
    state: directory
    mode: "0755"

- name: Deploy ai-config-sync script to ~/.local/bin
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/ai-config-sync.sh"
    dest: "{{ ai_sync_script_dest }}"
    mode: "0755"

# sync.conf is created once and never overwritten. DEV_MODE and GIT_BRANCH
# state live here and are mutated at runtime by the user.
- name: Create ai-config sync.conf if not present
  ansible.builtin.template:
    src: ai-sync.conf.j2
    dest: "{{ ai_sync_conf_path }}"
    mode: "0600"
    force: false

# REPO_URL must stay in sync with host_vars when the user switches from a
# raw URL to an SSH alias. This task updates only that one line.
- name: Ensure sync.conf REPO_URL matches ai_config_repo_url
  ansible.builtin.lineinfile:
    path: "{{ ai_sync_conf_path }}"
    regexp: '^REPO_URL='
    line: 'REPO_URL="{{ _ai_effective_repo_url }}"'

# ── Linux: systemd user timer ─────────────────────────────────────────────────

- name: Ensure systemd user unit directory exists (Linux)
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/systemd/user"
    state: directory
    mode: "0755"
  when: ansible_facts['system'] == 'Linux'

- name: Deploy ai-config-sync systemd user units
  ansible.builtin.template:
    src: "systemd/{{ item }}.j2"
    dest: "{{ xdg_config_home }}/systemd/user/{{ item }}"
    mode: "0644"
  loop:
    - ai-config-sync.service
    - ai-config-sync.timer
  when: ansible_facts['system'] == 'Linux'
  notify: Reload and enable ai-config timer

- name: Ensure systemd user daemon is reloaded (Linux)
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when: ansible_facts['system'] == 'Linux'

# ── macOS: launchd agent ──────────────────────────────────────────────────────

- name: Ensure LaunchAgents directory exists (macOS)
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents"
    state: directory
    mode: "0755"
  when: ansible_facts['system'] == 'Darwin'

- name: Deploy ai-config-sync launchd agent plist (macOS)
  ansible.builtin.template:
    src: launchd/com.ai-config.sync.plist.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.ai-config.sync.plist"
    mode: "0644"
  when: ansible_facts['system'] == 'Darwin'
  notify: Load ai-config launchd agent
