# ============================================================================
# Section 0 — Guard: skip role cleanly if no config repo URL is set
# ============================================================================
# The ai-tools role is a no-op when ai_config_repo_url is empty. This lets
# the skeleton run on machines that haven't configured an ai-config repo yet
# without adding per-task when: guards everywhere.

- name: Verify ai_config_repo_url is set before continuing
  ansible.builtin.assert:
    that: ai_config_repo_url | length > 0
    fail_msg: >-
      ai_config_repo_url is empty. Set it in host_vars/localhost.yml to
      deploy AI tool config, or exclude the ai-tools tag to skip this role.
    success_msg: "ai_config_repo_url is set — proceeding with ai-tools role."

# ============================================================================
# Section 1 — Resolve effective repo URL
# ============================================================================
# Mirrors the nvim role pattern. install.sh rewrites URLs to SSH alias form
# (git@github-dotfiles-ai:user/ai-config.git). This task normalises whatever
# is in host_vars into the canonical variable used for all subsequent git ops.

- name: Normalise ai_config_repo_url to SSH alias format
  ansible.builtin.set_fact:
    _ai_effective_repo_url: >-
      {{
        ai_config_repo_url
        | regex_replace('^https://github\.com/(.+?)(?:\.git)?$', 'git@github.com:\1.git')
        | regex_replace('git@github\.com:', 'git@github-dotfiles-ai:')
      }}

# ============================================================================
# Section 2 — Clone or update ai-config repository
# ============================================================================

- name: Ensure ai-config clone parent directory exists
  ansible.builtin.file:
    path: "{{ ai_config_clone_dir | dirname }}"
    state: directory
    mode: "0755"

- name: Check whether ai-config clone directory exists and is a git repo
  ansible.builtin.command:
    cmd: git rev-parse --git-dir
    chdir: "{{ ai_config_clone_dir }}"
  register: _ai_git_check
  changed_when: false
  failed_when: false

- name: Back up existing non-git directory before cloning
  ansible.builtin.command:
    cmd: >-
      mv {{ ai_config_clone_dir }}
      {{ ai_config_clone_dir }}.bak-{{ ansible_facts['date_time']['date'] }}
  when:
    - _ai_git_check.rc != 0
    - ai_config_clone_dir is directory
  changed_when: true

- name: Clone or update ai-config repository
  ansible.builtin.git:
    repo: "{{ _ai_effective_repo_url }}"
    dest: "{{ ai_config_clone_dir }}"
    version: "{{ ai_config_branch }}"
    update: "{{ ai_config_update | bool }}"
    force: false
  register: _ai_config_git_result

- name: Report ai-config clone/update status
  ansible.builtin.debug:
    msg: >-
      ai-config: {{
        'skipped (update disabled)' if _ai_config_git_result is skipped
        else 'cloned fresh' if (_ai_config_git_result.before | default(none)) is none
        else ('already up to date' if not _ai_config_git_result.changed
              else ('updated '
                    + (_ai_config_git_result.before | default('unknown'))[:8]
                    + ' → '
                    + (_ai_config_git_result.after  | default('unknown'))[:8]))
      }}

# ============================================================================
# Section 3 — Deploy per-tool config files
# ============================================================================
# Each tool block:
#   1. Checks whether the source subdirectory exists in the cloned repo.
#   2. Creates the destination directory if it doesn't exist.
#   3. Copies files from source → destination with force: no, so existing
#      user files (auth state, local overrides) are never overwritten.
#
# Adding a new tool requires:
#   - A subdirectory in the ai-config repo (e.g. cursor/)
#   - An entry in ai_tool_destinations in defaults/main.yml and group_vars/all.yml
#   - A deploy block here following the same pattern
#
# The 'find' + 'copy' pattern is used rather than synchronize to avoid
# requiring rsync on the target, and to preserve force: no semantics per file.

# ── Resolve tool destination paths ────────────────────────────────────────────
# macOS overrides the cursor destination; all other tools are the same across
# Linux and macOS. We normalise here once rather than conditionally in each block.

- name: Set per-tool destination paths for Linux / WSL
  ansible.builtin.set_fact:
    _ai_dest_antigravity: "{{ ai_tool_destinations.antigravity }}"
    _ai_dest_claude: "{{ ai_tool_destinations.claude }}"
    _ai_dest_copilot: "{{ ai_tool_destinations.copilot }}"
    _ai_dest_cursor: "{{ ai_tool_destinations.cursor }}"
    _ai_dest_kiro: "{{ ai_tool_destinations.kiro }}"
  when: ansible_facts['system'] != 'Darwin'

- name: Set per-tool destination paths for macOS (cursor override)
  ansible.builtin.set_fact:
    _ai_dest_antigravity: "{{ ai_tool_destinations.antigravity }}"
    _ai_dest_claude: "{{ ai_tool_destinations.claude }}"
    _ai_dest_copilot: "{{ ai_tool_destinations.copilot }}"
    _ai_dest_cursor: >-
      {{ ansible_facts['env']['HOME'] }}/Library/Application Support/Cursor/User
    _ai_dest_kiro: "{{ ai_tool_destinations.kiro }}"
  when: ansible_facts['system'] == 'Darwin'

# ── Claude ────────────────────────────────────────────────────────────────────

- name: Check whether claude/ source directory exists in ai-config
  ansible.builtin.stat:
    path: "{{ ai_config_clone_dir }}/claude"
  register: _ai_claude_src

- name: Ensure Claude config destination directory exists
  ansible.builtin.file:
    path: "{{ _ai_dest_claude }}"
    state: directory
    mode: "0700"
  when: _ai_claude_src.stat.exists and _ai_claude_src.stat.isdir

- name: Find all files in claude/ source directory
  ansible.builtin.find:
    paths: "{{ ai_config_clone_dir }}/claude"
    recurse: true
    file_type: file
  register: _ai_claude_files
  when: _ai_claude_src.stat.exists and _ai_claude_src.stat.isdir

- name: Ensure subdirectory structure exists under Claude destination
  ansible.builtin.file:
    path: >-
      {{ _ai_dest_claude }}/{{
        (item.path | relpath(ai_config_clone_dir + '/claude')) | dirname
      }}
    state: directory
    mode: "0755"
  loop: "{{ _ai_claude_files.files | default([]) }}"
  when:
    - _ai_claude_src.stat.exists and _ai_claude_src.stat.isdir
    - (item.path | relpath(ai_config_clone_dir + '/claude') | dirname) != '.'
  loop_control:
    label: "{{ item.path | basename }}"

- name: Deploy Claude config files (never overwrite existing)
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: >-
      {{ _ai_dest_claude }}/{{
        item.path | relpath(ai_config_clone_dir + '/claude')
      }}
    mode: "0600"
    force: false
  loop: "{{ _ai_claude_files.files | default([]) }}"
  when: _ai_claude_src.stat.exists and _ai_claude_src.stat.isdir
  loop_control:
    label: "{{ item.path | relpath(ai_config_clone_dir + '/claude') }}"

