# ============================================================================
# Section 1 - Gather OS facts
# ============================================================================
- name: Gather distribution, kernel, and environment facts required by roles
  ansible.builtin.setup:
    gather_subset:
      - distribution
      - kernel
      - env

# ============================================================================
# Section 2 - Set derived facts
# ============================================================================
- name: Set dotfiles OS family fact for platform-specific role selection
  ansible.builtin.set_fact:
    dotfiles_os_family: "{{ ansible_facts['os_family'] }}" # Used by shell role selection and future package role conditionals.

- name: Set dotfiles distro fact for distro-specific role behavior
  ansible.builtin.set_fact:
    dotfiles_distro: "{{ ansible_facts['distribution'] | lower }}" # Used by shell role distro file selection logic.

- name: Set dotfiles WSL fact for additive WSL platform conditionals
  ansible.builtin.set_fact:
    dotfiles_is_wsl: "{{ 'microsoft' in ansible_facts['kernel'] | lower }}" # Used by shell role to source WSL platform snippets when applicable.

- name: Set dotfiles machine name fact for identity-aware configuration
  ansible.builtin.set_fact:
    dotfiles_machine_name: "{{ machine_name | default(ansible_facts['hostname']) }}" # Used by git role to derive machine identity when writing config.

# ============================================================================
# Section 3 - Create XDG base directories
# ============================================================================
- name: Ensure base XDG and role destination directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ common_xdg_dirs }}"

# ============================================================================
# Section 4 - Install bash-logger
# ============================================================================
- name: Check for system-wide bash-logger installation
  ansible.builtin.stat:
    path: /usr/local/lib/bash-logger/logging.sh
  register: _bash_logger_system

- name: Ensure user bash-logger lib directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/lib/bash-logger"
    state: directory
    mode: "0755"
  when: not _bash_logger_system.stat.exists

- name: Clone or update bash-logger repository to staging location
  ansible.builtin.git:
    repo: "{{ bash_logger_repo_url }}"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/lib/bash-logger-src"
    version: main
    depth: 1
  when: not _bash_logger_system.stat.exists

- name: Deploy bash-logger logging.sh from staging to lib directory
  ansible.builtin.copy:
    src: "{{ ansible_facts['env']['HOME'] }}/.local/lib/bash-logger-src/logging.sh"
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/lib/bash-logger/logging.sh"
    mode: "0644"
    remote_src: true
  when: not _bash_logger_system.stat.exists
