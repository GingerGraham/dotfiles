- name: Reload and enable dotfiles timer
  ansible.builtin.systemd:
    name: dotfiles-sync.timer
    state: started
    enabled: true
    scope: user
    daemon_reload: true
  when: ansible_facts['system'] == "Linux"

- name: Load launchd agent
  ansible.builtin.command: >
    launchctl load -w
    {{ ansible_facts['env']['HOME'] }}/Library/LaunchAgents/com.dotfiles.sync.plist
  changed_when: true
  when: ansible_facts['system'] == "Darwin"
