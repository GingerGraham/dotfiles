# Installs the dotfiles GitOps sync service and stable user-facing wrappers.
# Does NOT create sync.conf if it already exists — that file is owned by install.sh
# and dotfiles-branch at runtime.

- name: Ensure XDG state and log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_env.HOME }}/.local/bin"
    - "{{ xdg_data_home }}/dotfiles/logs"
    - "{{ xdg_config_home }}/dotfiles"
    - "{{ xdg_config_home }}/systemd/user"

# ── Scripts ───────────────────────────────────────────────────────────────────

- name: Make repo scripts executable
  ansible.builtin.file:
    path: "{{ dotfiles_dir }}/scripts/{{ item }}"
    mode: "0755"
  loop:
    - sync.sh
    - switch-branch.sh
  failed_when: false

# Deploy stable wrappers to ~/.local/bin so the path never changes even if
# the repo moves. Symlinks rather than copies — changes in the repo are
# immediately reflected without re-running Ansible.
- name: Deploy dotfiles-sync wrapper symlink
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/scripts/sync.sh"
    dest: "{{ ansible_env.HOME }}/.local/bin/dotfiles-sync"
    state: link
    force: true

- name: Deploy dotfiles-branch wrapper symlink
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/scripts/switch-branch.sh"
    dest: "{{ ansible_env.HOME }}/.local/bin/dotfiles-branch"
    state: link
    force: true

# ── sync.conf ─────────────────────────────────────────────────────────────────

# Pre-initialise with a sentinel so subsequent when conditions are always
# evaluable — if the command task is skipped for any reason (check mode,
# upstream conditional, etc.) Ansible does not set the register variable at all,
# which causes 'is undefined' errors on any task that references it.
- name: Pre-initialise remote URL register
  ansible.builtin.set_fact:
    _dotfiles_remote_url: {rc: 1, stdout: ""}

# ansible.builtin.command is correct here — git remote get-url is a pure read
# with no side effects. changed_when: false satisfies the idempotency linter.
# ansible.builtin.git is a checkout module and does not inspect existing repos.
- name: Detect dotfiles remote URL from git
  ansible.builtin.command:
    cmd: git remote get-url origin
    chdir: "{{ dotfiles_dir }}"
  register: _dotfiles_remote_url
  changed_when: false
  failed_when: false
  check_mode: false

- name: Debug detected dotfiles remote URL
  ansible.builtin.debug:
    msg: "Detected dotfiles remote URL: {{ _dotfiles_remote_url.stdout | trim }}"
  when: _dotfiles_remote_url.rc == 0

- name: Fail with actionable message if remote URL cannot be determined
  ansible.builtin.fail:
    msg: >
      Could not determine dotfiles remote URL from 'git remote get-url origin'
      in {{ dotfiles_dir }} (exit code: {{ _dotfiles_remote_url.rc }}).
      Either the repo has no 'origin' remote or git is not available.
      Set dotfiles_repo_url explicitly in host_vars/localhost.yml to override.
  when:
    - _dotfiles_remote_url.rc != 0
    - dotfiles_repo_url == ""

- name: Set dotfiles_repo_url fact from git remote
  ansible.builtin.set_fact:
    dotfiles_repo_url: "{{ _dotfiles_remote_url.stdout | trim }}"
  when:
    - _dotfiles_remote_url.rc == 0
    - dotfiles_repo_url == ""

# Only create sync.conf if it does not already exist. install.sh creates it
# interactively on first run; dotfiles-branch mutates it at runtime.
# Ansible must never clobber it — DEV_MODE and GIT_BRANCH state live here.
- name: Create sync.conf if not present
  ansible.builtin.template:
    src: sync.conf.j2
    dest: "{{ xdg_config_home }}/dotfiles/sync.conf"
    mode: "0600"
    force: false

# ── Linux: systemd user timer ─────────────────────────────────────────────────

- name: Deploy systemd user units
  ansible.builtin.template:
    src: "systemd/{{ item }}.j2"
    dest: "{{ xdg_config_home }}/systemd/user/{{ item }}"
    mode: "0644"
  loop:
    - dotfiles-sync.service
    - dotfiles-sync.timer
  when: ansible_system == "Linux"
  notify: Reload and enable dotfiles timer

- name: Ensure systemd user instance is available (WSL workaround)
  ansible.builtin.command: systemctl --user daemon-reload
  changed_when: false
  when: ansible_system == "Linux"

# ── macOS: launchd agent ──────────────────────────────────────────────────────

- name: Deploy launchd agent plist
  ansible.builtin.template:
    src: launchd/com.dotfiles.sync.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.dotfiles.sync.plist"
    mode: "0644"
  when: ansible_system == "Darwin"
  notify: Load launchd agent