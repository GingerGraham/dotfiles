# ── XDG Base Directories ─────────────────────────────────────────────────────
xdg_config_home: "{{ ansible_facts['env']['HOME'] }}/.config" # Base XDG config directory; override only if you intentionally use a non-standard config root.
xdg_data_home: "{{ ansible_facts['env']['HOME'] }}/.local/share" # Base XDG data directory; override for custom local data locations.
xdg_cache_home: "{{ ansible_facts['env']['HOME'] }}/.cache" # Base XDG cache directory; override if cache files must live elsewhere.
xdg_state_home: "{{ ansible_facts['env']['HOME'] }}/.local/state" # Base XDG state directory; override when state data should be redirected.

# ── Derived Config Paths ──────────────────────────────────────────────────────
# Roles reference these variables, never hardcoded paths
shell_config_dir: "{{ xdg_config_home }}/shell" # Shell role destination; override only if shell config should not live under XDG config.
git_config_dir: "{{ xdg_config_home }}/git" # Git role destination; override only for a custom git config layout.
nvim_config_dir: "{{ xdg_config_home }}/nvim" # Neovim config destination; override for non-standard nvim config placement.

# ── Profile ───────────────────────────────────────────────────────────────────
# Override in host_vars/localhost.yml. Valid values: workstation | server | minimal
dotfiles_profile: workstation # Default role profile; override per machine to control which role set is activated.

# ── Remote Repos ─────────────────────────────────────────────────────────────
# Override in host_vars/localhost.yml. Left empty here — roles skip clone tasks
# if the URL is empty, allowing the skeleton to run without credentials.
nvim_config_repo_url: "" # Neovim repo URL; override in host_vars when you want the nvim role to clone your config.
ai_config_repo_url: "" # AI tools repo URL; override in host_vars when you want the ai-tools role to clone config.

# ── AI Tool Config Paths ──────────────────────────────────────────────────────
# Destination for ~/.claude symlink — same on all platforms for now
claude_config_dest: "{{ ansible_facts['env']['HOME'] }}/.claude" # Claude config destination; override only if you want a non-default target path.

# Copilot config path differs by OS — overridden per os_family if needed
copilot_config_dest: >- # Copilot config destination; override if your platform or setup requires a custom location.
  {{ ansible_facts['env']['HOME'] + '/.config/github-copilot'
     if ansible_os_family != 'Darwin'
     else ansible_facts['env']['HOME'] + '/Library/Application Support/GitHub Copilot' }}

# ── WSL Detection ─────────────────────────────────────────────────────────────
# WSL detection is handled by the common role, which sets the dotfiles_is_wsl fact.
# Use dotfiles_is_wsl in all role when: conditions — never reference ansible_kernel
# directly outside the common role. Detection logic: 'microsoft' in ansible_kernel | lower
