---
- name: Apply dotfiles workstation profile
  hosts: localhost
  gather_facts: false
  tasks:
    # Profile behaviour in this playbook:
    #   workstation — all roles run (sync-external, sync gated by when: conditions below)
    #   server      — use server.yml instead; this playbook is not profile-aware beyond
    #                 the workstation gate on tmux/vim
    #   minimal     — common, shell, git, ssh only; tmux, vim, sync-external, sync skipped
    - name: Import common role
      ansible.builtin.import_role:
        name: common
      tags:
        - common

    - name: Import shell role
      ansible.builtin.import_role:
        name: shell
      tags:
        - shell

    - name: Import git role
      ansible.builtin.import_role:
        name: git
      tags:
        - git

    - name: Import ssh role
      ansible.builtin.import_role:
        name: ssh
      tags:
        - ssh

    - name: Import tmux role for workstation and server profiles
      ansible.builtin.import_role:
        name: tmux
      when: dotfiles_profile in ['workstation', 'server']
      tags:
        - tmux

    - name: Import vim role for workstation and server profiles
      ansible.builtin.import_role:
        name: vim
      when: dotfiles_profile in ['workstation', 'server']
      tags:
        - vim

    - name: Import sync-external role for workstation and server profiles
      ansible.builtin.import_role:
        name: sync-external
      when:
        - dotfiles_profile in ['workstation', 'server']
        - dotfiles_sync_enabled | bool
      tags:
        - sync-external

    - name: Import sync role for workstation and server profiles
      ansible.builtin.import_role:
        name: sync
      when:
        - dotfiles_profile in ['workstation', 'server']
        - dotfiles_sync_enabled | bool
      tags:
        - sync

    - name: Import extra roles
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop: "{{ dotfiles_extra_roles }}"
      when: dotfiles_extra_roles | length > 0
      tags:
        - extras
