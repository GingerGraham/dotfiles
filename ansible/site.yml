- name: Apply dotfiles workstation profile
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Import common role
      ansible.builtin.import_role:
        name: common
      tags:
        - common

    - name: Import shell role
      ansible.builtin.import_role:
        name: shell
      tags:
        - shell

    - name: Import git role
      ansible.builtin.import_role:
        name: git
      tags:
        - git

    - name: Import ssh role
      ansible.builtin.import_role:
        name: ssh
      tags:
        - ssh

    - name: Import nvim role for workstation profile
      ansible.builtin.import_role:
        name: nvim
      when: dotfiles_profile == 'workstation'
      tags:
        - nvim

    - name: Import ai-tools role for workstation profile
      ansible.builtin.import_role:
        name: ai-tools
      when: dotfiles_profile == 'workstation'
      tags:
        - ai-tools

    - name: Import sync role for workstation and server profiles
      ansible.builtin.import_role:
        name: sync
      when: dotfiles_profile in ['workstation', 'server']
      tags:
        - sync
