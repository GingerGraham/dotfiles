- name: Apply dotfiles workstation profile
  hosts: localhost
  gather_facts: false
  tasks:
    # Profile behaviour in this playbook:
    #   workstation — all roles run (nvim, ai-tools, sync gated by when: conditions above)
    #   server      — use server.yml instead; this playbook is not profile-aware beyond
    #                 the workstation gate on nvim/ai-tools
    #   minimal     — shell, git, ssh run unconditionally; nvim, ai-tools, sync are skipped
    #                 This is intentional: minimal is workstation minus those three roles.
    - name: Import common role
      ansible.builtin.import_role:
        name: common
      tags:
        - common

    - name: Import shell role
      ansible.builtin.import_role:
        name: shell
      tags:
        - shell

    - name: Import git role
      ansible.builtin.import_role:
        name: git
      tags:
        - git

    - name: Import ssh role
      ansible.builtin.import_role:
        name: ssh
      tags:
        - ssh

    - name: Import nvim role for workstation profile
      ansible.builtin.import_role:
        name: nvim
      when: dotfiles_profile == 'workstation'
      tags:
        - nvim

    - name: Import ai-tools role for workstation profile
      ansible.builtin.import_role:
        name: ai-tools
      when: dotfiles_profile == 'workstation'
      tags:
        - ai-tools

    - name: Import sync role for workstation and server profiles
      ansible.builtin.import_role:
        name: sync
      when: dotfiles_profile in ['workstation', 'server']
      tags:
        - sync
