---
- name: Apply dotfiles server profile
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Import common role
      ansible.builtin.import_role:
        name: common
      tags:
        - common

    - name: Import shell role
      ansible.builtin.import_role:
        name: shell
      tags:
        - shell

    - name: Import git role
      ansible.builtin.import_role:
        name: git
      tags:
        - git

    - name: Import ssh role
      ansible.builtin.import_role:
        name: ssh
      tags:
        - ssh

    - name: Import tmux role
      ansible.builtin.import_role:
        name: tmux
      tags:
        - tmux

    - name: Import vim role
      ansible.builtin.import_role:
        name: vim
      tags:
        - vim

    - name: Import sync role
      ansible.builtin.import_role:
        name: sync
      when: dotfiles_sync_enabled | bool
      tags:
        - sync

    - name: Import extra roles
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop: "{{ dotfiles_extra_roles }}"
      when: dotfiles_extra_roles | length > 0
      tags:
        - extras
