# tmux.conf
# Managed via dotfiles repo — symlinked to ~/.config/tmux/tmux.conf
# tmux reads this path natively since 3.1 (XDG support).
# TPM auto-bootstraps on first launch if ~/.tmux/plugins/tpm is absent.
#
# Default shell is intentionally not set here — tmux inherits the login shell.

# ── Terminal ──────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true-colour passthrough

# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 10000
set -g base-index 1           # windows start at 1, not 0
setw -g pane-base-index 1     # panes start at 1, not 0
set -g renumber-windows on    # close a window → remaining windows renumber

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# ── Session persistence (resurrect + continuum) ───────────────────────────────
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @resurrect-capture-pane-contents 'on'

# ── Dracula theme ─────────────────────────────────────────────────────────────
# Full plugin reference: https://draculatheme.com/tmux
set -g @dracula-show-left-icon shortname
set -g @dracula-show-powerline true
set -g @dracula-refresh-rate 5
set -g @dracula-show-flags true
set -g @dracula-plugins "cpu-usage ram-usage ssh-session weather time"
set -g @dracula-day-month true
set -g @dracula-military-time true
set -g @dracula-show-fahrenheit false
set -g @dracula-show-location true

# ── Sidebar ───────────────────────────────────────────────────────────────────
set -g @sidebar-tree-position 'right'
set -g @sidebar-tree-command 'tree -C'

# ── TPM bootstrap + init (must be last) ───────────────────────────────────────
# Clones TPM and installs all plugins automatically on a fresh machine.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm \
   && ~/.tmux/plugins/tpm/bin/install_plugins'"

run -b '~/.tmux/plugins/tpm/tpm'
